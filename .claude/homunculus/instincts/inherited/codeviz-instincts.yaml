# Codeviz Workflow Feature Development With Cross File Analysis

## Action

Follow the feature-development-with-cross-file-analysis workflow:
1. Update or extend analysis model/types in src/lib/analysis/types.ts
2. Implement feature logic in relevant analyzers (src/lib/analysis/analyzers/{language}.ts, shared.ts)
3. Update API to expose new analysis (src/app/api/analyze/route.ts)
4. Update UI components to visualize new feature (src/components/ui/Diagram.tsx, src/components/ui/CodeWorkspace.tsx, src/components/ui/CodeTool.tsx)
5. Update i18n dictionaries if UI text changes (src/i18n/dictionaries/*.json)
6. Add or update tests in src/lib/analysis/analyzers/analyzers.test.ts

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/lib/analysis/types.ts, src/lib/analysis/analyzers/{language}.ts, src/lib/analysis/analyzers/shared.ts

