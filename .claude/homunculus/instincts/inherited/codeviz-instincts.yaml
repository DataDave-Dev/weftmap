# Codeviz Workflow Extend Language Support

## Action

Follow the extend-language-support workflow:
1. Implement or update analyzer for the new or enhanced language in src/lib/analysis/analyzers/{language}.ts
2. Update shared analyzer logic in src/lib/analysis/analyzers/shared.ts or src/lib/analysis/analyzers/jslike.ts
3. Register the new analyzer in src/lib/analysis/registry.ts (if applicable)
4. Add or update tests in src/lib/analysis/analyzers/analyzers.test.ts
5. Update API route if necessary (src/app/api/analyze/route.ts)
6. Update UI components (src/components/ui/CodeWorkspace.tsx, src/components/ui/Diagram.tsx) to reflect new language options, diagrams, or filtering
7. Add WASM grammar files in public/wasm/ (if needed)
8. Update language selector and samples in UI

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/lib/analysis/analyzers/{language}.ts, src/lib/analysis/analyzers/shared.ts, src/lib/analysis/analyzers/jslike.ts

